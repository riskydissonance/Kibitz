# Build the macOS .app bundle and attach it to a GitHub Release, so non-terminal Mac users can
# download "Tintin's AI Chess Analysis.app" instead of running scripts/build_app.sh themselves.
#
# Triggers:
#   • pushing a version tag (v1.0, v1.2.3, …) — builds and publishes a Release for that tag.
#   • manual run (Actions → Build macOS app → Run workflow) — builds and uploads the artifact
#     without creating a Release (handy for testing the bundle).
name: Build macOS app

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write   # needed to create the Release and upload assets

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      # build_app.sh only assembles the bundle (rsync + plist + launcher + optional icon via the
      # preinstalled sips/iconutil). It does NOT need uv/Python/Stockfish — those are fetched on the
      # app's first launch on the end user's machine — so there's nothing else to set up here.
      - name: Build the .app bundle
        run: ./scripts/build_app.sh

      # ditto preserves the bundle's structure/permissions in the zip (plain `zip` can mangle it).
      - name: Zip the bundle
        run: ditto -c -k --sequesterRsrc --keepParent "Tintin's AI Chess Analysis.app" "Tintins-AI-Chess-Analysis-macos.zip"

      - name: Upload as a build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Tintins-AI-Chess-Analysis-macos
          path: Tintins-AI-Chess-Analysis-macos.zip

      # On a tag push, publish (or update) the Release and attach the zip.
      - name: Attach to the Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes "macOS app build. Download the zip below, unzip, drag the .app into /Applications. First open (unsigned app): double-click it, then go to System Settings → Privacy & Security and click 'Open Anyway'. You only do this once. (This extra step exists only because the app isn't signed with an Apple Developer certificate — I'd rather not pay Apple's \$100/year developer fee just to remove it.)" \
            "Tintins-AI-Chess-Analysis-macos.zip" \
          || gh release upload "${GITHUB_REF_NAME}" "Tintins-AI-Chess-Analysis-macos.zip" --clobber
