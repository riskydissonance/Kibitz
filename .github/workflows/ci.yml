name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # uv builds the env from pyproject/uv.lock and fetches a compatible Python — no Stockfish or
      # `claude` CLI needed: the suite is all fast unit/mock tests (network and engine are mocked).
      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Run the test suite
        run: uv run --extra dev pytest
